<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Arvind Lucky Wheel</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #1a0533 0%, #0d1b4b 50%, #0a3d2e 100%);
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* TOP BAR */
  .topbar {
    background: rgba(0,0,0,0.5);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid #f0a500;
  }
  .topbar .user-info { display: flex; align-items: center; gap: 10px; }
  .topbar .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #f0a500, #e05c00);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; border: 2px solid #ffd700;
  }
  .topbar .username { font-size: 14px; font-weight: bold; color: #ffd700; }
  .topbar .user-id { font-size: 11px; color: #aaa; }
  .balance-area {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,215,0,0.15);
    border: 1px solid #ffd700;
    border-radius: 20px;
    padding: 6px 14px;
  }
  .balance-area .diamond { font-size: 18px; }
  .balance-area .amount { font-size: 16px; font-weight: bold; color: #ffd700; }
  .add-btn {
    background: linear-gradient(135deg, #00c853, #00796b);
    border: none; border-radius: 50%;
    width: 28px; height: 28px;
    color: #fff; font-size: 18px; cursor: pointer;
  }

  /* ROUND INFO */
  .round-info {
    text-align: center;
    padding: 8px;
    font-size: 13px;
    color: #ffd700;
    background: rgba(0,0,0,0.3);
  }

  /* GAME AREA */
  .game-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    gap: 10px;
  }

  /* FERRIS WHEEL */
  .wheel-container {
    position: relative;
    width: 320px;
    height: 320px;
  }
  .wheel-svg { width: 100%; height: 100%; }

  /* TIMER in center */
  .center-timer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, #5d3a1a, #3b1a00);
    border: 4px solid #f0a500;
    border-radius: 50%;
    width: 90px; height: 90px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: 0 0 20px rgba(240,165,0,0.5);
  }
  .center-timer .label { font-size: 10px; color: #ffd700; font-weight: bold; }
  .center-timer .time { font-size: 28px; font-weight: bold; color: #fff; line-height: 1; }
  .center-timer .unit { font-size: 11px; color: #ffd700; }

  /* BET SLOTS around wheel */
  .bet-slot {
    position: absolute;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
  }
  .bet-slot .item-icon { font-size: 28px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .bet-slot .multiplier {
    background: #8B0000;
    color: #ffd700;
    font-size: 10px; font-weight: bold;
    padding: 2px 6px; border-radius: 10px;
    border: 1px solid #ffd700;
  }
  .bet-slot .you-label { font-size: 9px; color: #aaa; }
  .bet-slot .bet-input {
    width: 64px; height: 24px;
    background: rgba(255,255,255,0.1);
    border: 1px solid #f0a500;
    border-radius: 4px;
    color: #ffd700; font-size: 11px;
    text-align: center; outline: none;
  }
  .bet-slot .bet-input:focus { border-color: #fff; }

  /* Slot positions */
  .slot-top    { top: 0px;   left: 50%; transform: translateX(-50%); }
  .slot-tr     { top: 60px;  right: 10px; }
  .slot-right  { top: 50%;   right: -10px; transform: translateY(-50%); }
  .slot-br     { bottom: 60px; right: 10px; }
  .slot-bottom { bottom: 0px; left: 50%; transform: translateX(-50%); }
  .slot-bl     { bottom: 60px; left: 10px; }
  .slot-left   { top: 50%;   left: -10px; transform: translateY(-50%); }
  .slot-tl     { top: 60px;  left: 10px; }

  /* QUICK BET CHIPS */
  .chips-row {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
  }
  .chip {
    background: linear-gradient(135deg, #8B4513, #5C2D00);
    border: 2px solid #f0a500;
    border-radius: 50%;
    width: 52px; height: 52px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.1s;
    font-size: 11px; font-weight: bold; color: #ffd700;
  }
  .chip:hover { transform: scale(1.1); }
  .chip:active { transform: scale(0.95); }
  .chip .diamond-icon { font-size: 14px; }

  /* RESULT ITEMS LEFT PANEL */
  .left-items {
    position: fixed; left: 6px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 6px;
  }
  .left-item {
    font-size: 22px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    cursor: pointer;
    transition: transform 0.2s;
  }
  .left-item:hover { transform: scale(1.2); }

  /* BOTTOM SECTION */
  .bottom-section {
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 8px;
    padding: 0 10px;
  }

  .history-row {
    display: flex; gap: 8px;
  }
  .history-btn, .my-history-btn {
    flex: 1; padding: 12px;
    border-radius: 10px; border: 2px solid #f0a500;
    background: rgba(0,0,0,0.4);
    color: #ffd700; font-size: 13px; font-weight: bold;
    cursor: pointer; display: flex;
    align-items: center; justify-content: space-between;
  }
  .history-btn:hover, .my-history-btn:hover { background: rgba(240,165,0,0.2); }

  .revenue-bar {
    background: rgba(0,0,0,0.5);
    border: 2px solid #f0a500;
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; align-items: center;
    justify-content: space-between;
  }
  .revenue-left { display: flex; align-items: center; gap: 8px; }
  .revenue-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #f0a500, #e05c00);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: bold;
  }
  .revenue-info .rname { font-size: 12px; font-weight: bold; color: #ffd700; }
  .revenue-info .rcoins {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; color: #ffd700;
  }
  .today-revenue { text-align: center; }
  .today-revenue .tr-label { font-size: 10px; color: #aaa; }
  .today-revenue .tr-amount { font-size: 14px; font-weight: bold; color: #ffd700; }

  .auto-play-btn {
    background: linear-gradient(135deg, #f0a500, #e07000);
    border: none; border-radius: 10px;
    padding: 10px 20px;
    color: #fff; font-size: 14px; font-weight: bold;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 12px rgba(240,165,0,0.4);
  }
  .auto-play-btn:hover { transform: scale(1.05); }
  .auto-play-btn.active { background: linear-gradient(135deg, #e05c00, #c0392b); }

  /* RESULT POPUP */
  .result-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: linear-gradient(135deg, #1a0533, #0d1b4b);
    border: 3px solid #f0a500;
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    min-width: 260px;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-box h2 { font-size: 24px; color: #ffd700; margin-bottom: 10px; }
  .result-box .result-icon { font-size: 60px; margin: 10px 0; }
  .result-box .win-amount { font-size: 32px; font-weight: bold; color: #00e676; }
  .result-box .lose-amount { font-size: 32px; font-weight: bold; color: #ff5252; }
  .result-close {
    margin-top: 16px;
    background: linear-gradient(135deg, #f0a500, #e07000);
    border: none; border-radius: 10px;
    padding: 10px 30px; color: #fff; font-size: 16px;
    font-weight: bold; cursor: pointer;
  }

  /* HISTORY MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #1a0533;
    border: 2px solid #f0a500;
    border-radius: 16px;
    width: 90%; max-width: 360px;
    max-height: 70vh;
    overflow-y: auto;
    padding: 16px;
  }
  .modal-box h3 { color: #ffd700; margin-bottom: 12px; font-size: 16px; text-align: center; }
  .history-item {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 13px;
  }
  .history-item .hi-round { color: #aaa; }
  .history-item .hi-item { font-size: 16px; }
  .history-item .hi-win { color: #00e676; font-weight: bold; }
  .history-item .hi-lose { color: #ff5252; font-weight: bold; }
  .modal-close {
    width: 100%; margin-top: 12px;
    background: #f0a500; border: none; border-radius: 8px;
    padding: 10px; color: #fff; font-size: 14px;
    font-weight: bold; cursor: pointer;
  }

  /* SPINNING WHEEL ANIMATION */
  .wheel-spin {
    animation: rotateFerris 3s linear infinite;
    transform-origin: center;
  }
  @keyframes rotateFerris {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .wheel-stopped { animation: none; }

  /* WINNING FLASH */
  .winning-slot { animation: flash 0.5s ease infinite alternate; }
  @keyframes flash {
    from { filter: brightness(1) drop-shadow(0 0 0px gold); }
    to { filter: brightness(2) drop-shadow(0 0 10px gold); }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="user-info">
    <div class="avatar" id="avatarText">A</div>
    <div>
      <div class="username" id="displayName">Loading...</div>
      <div class="user-id" id="displayId">ID: ---</div>
    </div>
  </div>
  <div class="balance-area">
    <span class="diamond">💎</span>
    <span class="amount" id="balanceDisplay">0</span>
    <button class="add-btn" onclick="showAddCoins()">+</button>
  </div>
</div>

<!-- ROUND INFO -->
<div class="round-info">Today Round: <span id="roundNumber">1</span></div>

<!-- LEFT ITEMS PANEL -->
<div class="left-items">
  <div class="left-item" title="Watermelon">🍉</div>
  <div class="left-item" title="Lettuce">🥬</div>
  <div class="left-item" title="Grape">🍇</div>
  <div class="left-item" title="Orange">🍊</div>
  <div class="left-item" title="Salad">🥗</div>
</div>

<!-- GAME AREA -->
<div class="game-area">

  <!-- FERRIS WHEEL -->
  <div class="wheel-container">
    <!-- SVG Ferris Wheel -->
    <svg class="wheel-svg" viewBox="0 0 320 320" id="ferrisWheel">
      <!-- Outer ring -->
      <circle cx="160" cy="160" r="130" fill="none" stroke="#8B4513" stroke-width="14"/>
      <!-- Inner ring -->
      <circle cx="160" cy="160" r="40" fill="url(#centerGrad)" stroke="#f0a500" stroke-width="4"/>
      <!-- Spokes -->
      <g id="spokes" class="wheel-spin">
        <line x1="160" y1="160" x2="160" y2="30" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="252" y2="68" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="290" y2="160" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="252" y2="252" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="160" y2="290" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="68" y2="252" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="30" y2="160" stroke="#8B4513" stroke-width="8"/>
        <line x1="160" y1="160" x2="68" y2="68" stroke="#8B4513" stroke-width="8"/>
        <!-- Gondola dots on ring -->
        <circle cx="160" cy="30" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="252" cy="68" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="290" cy="160" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="252" cy="252" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="160" cy="290" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="68" cy="252" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="30" cy="160" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
        <circle cx="68" cy="68" r="10" fill="#f0a500" stroke="#fff" stroke-width="2"/>
      </g>
      <!-- Stand -->
      <line x1="120" y1="290" x2="80" y2="318" stroke="#8B4513" stroke-width="10"/>
      <line x1="200" y1="290" x2="240" y2="318" stroke="#8B4513" stroke-width="10"/>
      <line x1="70" y1="316" x2="250" y2="316" stroke="#8B4513" stroke-width="8"/>
      <!-- Defs -->
      <defs>
        <radialGradient id="centerGrad">
          <stop offset="0%" stop-color="#8B4513"/>
          <stop offset="100%" stop-color="#3b1a00"/>
        </radialGradient>
      </defs>
    </svg>

    <!-- CENTER TIMER -->
    <div class="center-timer">
      <div class="label">SelectTime</div>
      <div class="time" id="countdown">30</div>
      <div class="unit">s</div>
    </div>

    <!-- BET SLOTS -->
    <div class="bet-slot slot-top" id="slot-0">
      <div class="item-icon">🎃</div>
      <div class="multiplier">x45</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-0">
    </div>
    <div class="bet-slot slot-tr" id="slot-1">
      <div class="item-icon">🐟</div>
      <div class="multiplier">x25</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-1">
    </div>
    <div class="bet-slot slot-right" id="slot-2">
      <div class="item-icon">🌭</div>
      <div class="multiplier">x15</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-2">
    </div>
    <div class="bet-slot slot-br" id="slot-3">
      <div class="item-icon">🍑</div>
      <div class="multiplier">x10</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-3">
    </div>
    <div class="bet-slot slot-bottom" id="slot-4">
      <div class="item-icon">🍕</div>
      <div class="multiplier">x5</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-4">
    </div>
    <div class="bet-slot slot-bl" id="slot-5">
      <div class="item-icon">🍇</div>
      <div class="multiplier">x5</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-5">
    </div>
    <div class="bet-slot slot-left" id="slot-6">
      <div class="item-icon">🍊</div>
      <div class="multiplier">x5</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-6">
    </div>
    <div class="bet-slot slot-tl" id="slot-7">
      <div class="item-icon">🍉</div>
      <div class="multiplier">x5</div>
      <div class="you-label">You:</div>
      <input class="bet-input" type="number" placeholder="0" min="0" id="bet-7">
    </div>
  </div>

  <!-- QUICK BET CHIPS -->
  <div class="chips-row">
    <div class="chip" onclick="quickBet(10)"><div class="diamond-icon">💎</div>10</div>
    <div class="chip" onclick="quickBet(100)"><div class="diamond-icon">💎</div>100</div>
    <div class="chip" onclick="quickBet(1000)"><div class="diamond-icon">💎</div>1K</div>
    <div class="chip" onclick="quickBet(10000)"><div class="diamond-icon">💎</div>10K</div>
  </div>

  <!-- BOTTOM SECTION -->
  <div class="bottom-section">
    <div class="history-row">
      <button class="history-btn" onclick="showRoundHistory()">
        <span id="lastWinnerName">--</span>
        <span>▶</span>
      </button>
      <button class="my-history-btn" onclick="showMyHistory()">
        MyHistory <span>▶</span>
      </button>
    </div>
    <div class="revenue-bar">
      <div class="revenue-left">
        <div class="revenue-avatar" id="revAvatar">A</div>
        <div class="revenue-info">
          <div class="rname" id="revName">Arvind Kumar</div>
          <div class="rcoins">💎 <span id="myCoins">0</span></div>
        </div>
      </div>
      <div class="today-revenue">
        <div class="tr-label">Today's Revenue:</div>
        <div class="tr-amount">💎 <span id="todayRevenue">0</span></div>

<!-- RESULT POPUP -->
<div class="result-overlay" id="resultOverlay">

    <h2 id="resultTitle">Round Result!</h2>

    <div id="resultAmount"></div>
    <button class="result-close" onclick="closeResult()">OK</button>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box">
    <h3 id="historyTitle">My History</h3>
    <div id="historyList"></div>
    <button class="modal-close" onclick="closeHistory()">Close</button>
  </div>
</div>

<script>
// ========== GAME STATE ==========
let gameState = {
  userId: 'user_' + Math.random().toString(36).substr(2, 8),
  username: 'Player',
  balance: 5000,
  todayRevenue: 0,
  roundNumber: parseInt(localStorage.getItem('roundNum') || '333'),
  myHistory: JSON.parse(localStorage.getItem('myHistory') || '[]'),
  roundHistory: JSON.parse(localStorage.getItem('roundHistory') || '[]'),
  autoPlay: false,
  autoPlayInterval: null,
  selectedBets: {},
  timer: 30,
  timerInterval: null,
  isSpinning: false
};

const ITEMS = [
  { icon: '🎃', name: 'Pumpkin',  mult: 45, prob: 0.02 },
  { icon: '🐟', name: 'Fish',     mult: 25, prob: 0.04 },
  { icon: '🌭', name: 'Hotdog',   mult: 15, prob: 0.06 },
  { icon: '🍑', name: 'Peach',    mult: 10, prob: 0.10 },
  { icon: '🍕', name: 'Pizza',    mult: 5,  prob: 0.20 },
  { icon: '🍇', name: 'Grape',    mult: 5,  prob: 0.20 },
  { icon: '🍊', name: 'Orange',   mult: 5,  prob: 0.20 },
  { icon: '🍉', name: 'Melon',    mult: 5,  prob: 0.18 }
];

// ========== INIT ==========
function init() {
  // Get username from URL param or use default
  const urlParams = new URLSearchParams(window.location.search);
  const uname = urlParams.get('name') || 'Player';
  const uid = urlParams.get('id') || gameState.userId;
  const ubal = parseInt(urlParams.get('balance') || '5000');

  gameState.username = uname;
  gameState.userId = uid;
  gameState.balance = ubal;

  document.getElementById('displayName').textContent = uname;
  document.getElementById('displayId').textContent = 'ID: ' + uid;
  document.getElementById('avatarText').textContent = uname.charAt(0).toUpperCase();
  document.getElementById('revAvatar').textContent = uname.charAt(0).toUpperCase();
  document.getElementById('revName').textContent = uname;

  updateUI();
  startTimer();
}

function updateUI() {
  document.getElementById('balanceDisplay').textContent = formatNum(gameState.balance);
  document.getElementById('myCoins').textContent = formatNum(gameState.balance);
  document.getElementById('todayRevenue').textContent = formatNum(gameState.todayRevenue);
  document.getElementById('roundNumber').textContent = gameState.roundNumber;
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toString();
}

// ========== TIMER ==========
function startTimer() {
  gameState.timer = 30;
  document.getElementById('countdown').textContent = gameState.timer;
  clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    gameState.timer--;
    document.getElementById('countdown').textContent = gameState.timer;
    if (gameState.timer <= 0) {
      clearInterval(gameState.timerInterval);
      spinWheel();
    }
  }, 1000);
}

// ========== QUICK BET ==========
let selectedSlotIndex = 0;
function quickBet(amount) {
  if (gameState.isSpinning) return;
  if (gameState.balance < amount) {
    alert('Insufficient diamonds!');
    return;
  }
  const input = document.getElementById('bet-' + selectedSlotIndex);
  const current = parseInt(input.value || '0');
  input.value = current + amount;
}

// Tap on slot to select
for (let i = 0; i < 8; i++) {
  document.getElementById('slot-' + i).addEventListener('click', function() {
    selectedSlotIndex = i;
    document.querySelectorAll('.bet-slot').forEach(s => s.style.outline = 'none');
    this.style.outline = '2px solid #fff';
  });
}

// ========== SPIN ==========
function spinWheel() {
  if (gameState.isSpinning) return;
  gameState.isSpinning = true;

  // Collect bets
  let totalBet = 0;
  gameState.selectedBets = {};
  for (let i = 0; i < 8; i++) {
    const val = parseInt(document.getElementById('bet-' + i).value || '0');
    if (val > 0) {
      gameState.selectedBets[i] = val;
      totalBet += val;
    }
  }

  if (totalBet > gameState.balance) {
    alert('Insufficient balance!');
    gameState.isSpinning = false;
    startTimer();
    return;
  }

  // Deduct bet
  gameState.balance -= totalBet;
  updateUI();

  // Spin animation
  const spokes = document.getElementById('spokes');
  spokes.classList.add('wheel-spin');

  // Determine winner (weighted random)
  const rand = Math.random();
  let cumProb = 0;
  let winnerIdx = 4;
  for (let i = 0; i < ITEMS.length; i++) {
    cumProb += ITEMS[i].prob;
    if (rand <= cumProb) { winnerIdx = i; break; }
  }

  setTimeout(() => {
    spokes.classList.remove('wheel-spin');
    showResult(winnerIdx, totalBet);
  }, 3000);
}

function showResult(winnerIdx, totalBet) {
  const winner = ITEMS[winnerIdx];
  const betOnWinner = gameState.selectedBets[winnerIdx] || 0;
  let winAmount = 0;
  let netChange = -totalBet;

  if (betOnWinner > 0) {
    winAmount = betOnWinner * winner.mult;
    netChange = winAmount - totalBet;
    gameState.balance += winAmount;
  }

  gameState.todayRevenue += Math.max(0, winAmount);

  // Save history
  const record = {
    round: gameState.roundNumber,
    item: winner.icon,
    name: winner.name,
    bet: totalBet,
    win: winAmount,
    net: netChange,
    time: new Date().toLocaleTimeString()
  };
  gameState.myHistory.unshift(record);
  if (gameState.myHistory.length > 50) gameState.myHistory.pop();
  localStorage.setItem('myHistory', JSON.stringify(gameState.myHistory));

  gameState.roundHistory.unshift({ round: gameState.roundNumber, item: winner.icon, winner: gameState.username });
  if (gameState.roundHistory.length > 20) gameState.roundHistory.pop();
  localStorage.setItem('roundHistory', JSON.stringify(gameState.roundHistory));

  document.getElementById('lastWinnerName').textContent = gameState.username + ' ' + winner.icon;

  // Show popup
  const overlay = document.getElementById('resultOverlay');
  document.getElementById('resultIcon').textContent = winner.icon;
  if (netChange > 0) {
    document.getElementById('resultTitle').textContent = '🎉 You Won!';
    document.getElementById('resultAmount').innerHTML = `<div class="win-amount">+💎${formatNum(netChange)}</div>`;
  } else if (netChange === 0) {
    document.getElementById('resultTitle').textContent = 'Break Even!';
    document.getElementById('resultAmount').innerHTML = `<div style="color:#ffd700">±0</div>`;
  } else {
    document.getElementById('resultTitle').textContent = 'Better Luck Next Time!';
    document.getElementById('resultAmount').innerHTML = `<div class="lose-amount">-💎${formatNum(Math.abs(netChange))}</div>`;
  }
  overlay.classList.add('show');

  // Reset inputs
  for (let i = 0; i < 8; i++) document.getElementById('bet-' + i).value = '';
  gameState.roundNumber++;
  localStorage.setItem('roundNum', gameState.roundNumber);
  updateUI();
  gameState.isSpinning = false;

  if (!gameState.autoPlay) {
    // Wait for user to close popup
  }
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  startTimer();
  if (gameState.autoPlay) {
    setTimeout(() => autoPlaceBets(), 500);
  }
}

// ========== AUTO PLAY ==========
function toggleAutoPlay() {
  gameState.autoPlay = !gameState.autoPlay;
  const btn = document.getElementById('autoPlayBtn');
  if (gameState.autoPlay) {
    btn.classList.add('active');
    btn.textContent = 'Stop';
    autoPlaceBets();
  } else {
    btn.classList.remove('active');
    btn.innerHTML = 'Auto<br>Play';
  }
}

function autoPlaceBets() {
  if (!gameState.autoPlay) return;
  const randomSlot = Math.floor(Math.random() * 8);
  const randomBet = [10, 100, 1000][Math.floor(Math.random() * 3)];
  if (gameState.balance >= randomBet) {
    document.getElementById('bet-' + randomSlot).value = randomBet;
  }
}

// ========== HISTORY ==========
function showMyHistory() {
  const list = document.getElementById('historyList');
  document.getElementById('historyTitle').textContent = 'My History';
  if (gameState.myHistory.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px">No history yet</div>';
  } else {
    list.innerHTML = gameState.myHistory.map(h => `
      <div class="history-item">
        <span class="hi-round">Round ${h.round}</span>
        <span class="hi-item">${h.item}</span>
        <span class="${h.net >= 0 ? 'hi-win' : 'hi-lose'}">
          ${h.net >= 0 ? '+' : ''}💎${formatNum(h.net)}
        </span>
      </div>
    `).join('');
  }
  document.getElementById('historyModal').classList.add('show');
}

function showRoundHistory() {
  const list = document.getElementById('historyList');
  document.getElementById('historyTitle').textContent = 'Round History';
  if (gameState.roundHistory.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px">No history yet</div>';
  } else {
    list.innerHTML = gameState.roundHistory.map(h => `
      <div class="history-item">
        <span class="hi-round">Round ${h.round}</span>
        <span class="hi-item">${h.item}</span>
        <span style="color:#ffd700">${h.winner}</span>
      </div>
    `).join('');
  }
  document.getElementById('historyModal').classList.add('show');
}

function closeHistory() {
  document.getElementById('historyModal').classList.remove('show');
}

function showAddCoins() {
  alert('Contact admin to add diamonds! 💎');
}

// ========== START ==========
init();
</script>
