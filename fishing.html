<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎣 Arvind Fishing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(180deg, #001a33 0%, #003366 40%, #004d80 70%, #006699 100%);
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    color: #fff;
    overflow-x: hidden;
    user-select: none;
  }

  /* TOP BAR */
  .topbar {
    background: rgba(0,0,0,0.5);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid #00bcd4;
  }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #00bcd4, #0097a7);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: bold; border: 2px solid #80deea;
  }
  .username { font-size: 14px; font-weight: bold; color: #80deea; }
  .balance-bar {
    display: flex; align-items: center; gap: 6px;
    background: rgba(0,188,212,0.15);
    border: 1px solid #00bcd4; border-radius: 20px;
    padding: 6px 14px;
  }
  .balance-bar .amount { font-size: 16px; font-weight: bold; color: #ffd700; }

  /* GAME CANVAS AREA */
  .game-wrapper {
    position: relative; width: 100%; max-width: 420px;
    margin: 0 auto; overflow: hidden;
  }

  canvas#gameCanvas {
    display: block; width: 100%; touch-action: none;
    cursor: crosshair;
  }

  /* BOTTOM UI */
  .bottom-ui {
    max-width: 420px; margin: 0 auto;
    padding: 12px; background: rgba(0,0,0,0.6);
    border-top: 2px solid #00bcd4;
  }

  /* BET SECTION */
  .bet-section {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .bet-label { font-size: 13px; color: #80deea; white-space: nowrap; }
  .bet-input {
    flex: 1; padding: 8px 12px;
    background: rgba(0,188,212,0.1);
    border: 1px solid #00bcd4; border-radius: 8px;
    color: #ffd700; font-size: 15px; font-weight: bold;
    outline: none; text-align: center;
  }
  .bet-chips { display: flex; gap: 6px; }
  .bet-chip {
    background: linear-gradient(135deg, #1a5276, #0d3349);
    border: 1px solid #00bcd4; border-radius: 20px;
    padding: 5px 10px; font-size: 12px; font-weight: bold;
    color: #ffd700; cursor: pointer; transition: all 0.15s;
  }
  .bet-chip:hover { background: rgba(0,188,212,0.3); transform: scale(1.05); }

  /* MULTIPLIER TABLE */
  .mult-table {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 6px; margin-bottom: 10px;
  }
  .mult-item {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,188,212,0.3);
    border-radius: 8px; padding: 6px 4px;
    text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .mult-item:hover { border-color: #00bcd4; background: rgba(0,188,212,0.2); }
  .mult-item.selected { border-color: #ffd700; background: rgba(255,215,0,0.15); }
  .mult-item .fish-icon { font-size: 20px; }
  .mult-item .fish-mult { font-size: 10px; font-weight: bold; color: #ffd700; }
  .mult-item .fish-name { font-size: 9px; color: #80deea; }

  /* CAST BUTTON */
  .cast-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #00bcd4, #0097a7);
    border: none; border-radius: 12px;
    color: #fff; font-size: 16px; font-weight: bold;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 15px rgba(0,188,212,0.4);
  }
  .cast-btn:hover { transform: scale(1.02); }
  .cast-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }

  /* HISTORY ROW */
  .history-row {
    display: flex; gap: 6px; margin-top: 8px;
  }
  .history-btn {
    flex: 1; padding: 8px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(0,188,212,0.4);
    border-radius: 8px; color: #80deea;
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
  }
  .history-btn:hover { border-color: #00bcd4; }

  /* RESULT POPUP */
  .result-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 100;
    align-items: center; justify-content: center;
  }
  .result-overlay.show { display: flex; }
  .result-box {
    background: linear-gradient(135deg, #001a33, #003366);
    border: 3px solid #00bcd4; border-radius: 20px;
    padding: 30px; text-align: center; min-width: 260px;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .result-box h2 { font-size: 22px; color: #00bcd4; margin-bottom: 8px; }
  .result-box .result-fish { font-size: 64px; margin: 10px 0; }
  .result-box .win-amount { font-size: 30px; font-weight: bold; color: #00e676; }
  .result-box .lose-amount { font-size: 30px; font-weight: bold; color: #ff5252; }
  .result-close {
    margin-top: 16px;
    background: linear-gradient(135deg, #00bcd4, #0097a7);
    border: none; border-radius: 10px;
    padding: 10px 30px; color: #fff; font-size: 15px;
    font-weight: bold; cursor: pointer;
  }

  /* HISTORY MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #001a33; border: 2px solid #00bcd4;
    border-radius: 16px; width: 90%; max-width: 360px;
    max-height: 70vh; overflow-y: auto; padding: 16px;
  }
  .modal-box h3 { color: #00bcd4; margin-bottom: 12px; text-align: center; }
  .h-item {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
  }
  .modal-close {
    width: 100%; margin-top: 12px;
    background: #00bcd4; border: none; border-radius: 8px;
    padding: 10px; color: #fff; font-size: 14px;
    font-weight: bold; cursor: pointer;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="user-info">
    <div class="avatar" id="avatarEl">A</div>
    <div>
      <div class="username" id="nameEl">Player</div>
      <div style="font-size:11px;color:#aaa" id="idEl">ID: ---</div>
    </div>
  </div>
  <div class="balance-bar">
    <span>💎</span>
    <span class="amount" id="balEl">0</span>
  </div>
</div>

<!-- CANVAS -->
<div class="game-wrapper">
  <canvas id="gameCanvas" width="420" height="460"></canvas>
</div>

<!-- BOTTOM UI -->
<div class="bottom-ui">
  <!-- BET -->
  <div class="bet-section">
    <span class="bet-label">💎 Bet:</span>
    <input class="bet-input" type="number" id="betInput" value="100" min="10">
    <div class="bet-chips">
      <div class="bet-chip" onclick="addBet(100)">+100</div>
      <div class="bet-chip" onclick="addBet(1000)">+1K</div>
      <div class="bet-chip" onclick="addBet(10000)">+10K</div>
    </div>
  </div>

  <!-- FISH MULTIPLIER SELECTOR -->
  <div class="mult-table" id="multTable"></div>

  <!-- CAST -->
  <button class="cast-btn" id="castBtn" onclick="castLine()">🎣 Cast Line!</button>

  <!-- HISTORY -->
  <div class="history-row">
    <button class="history-btn" onclick="showHistory()">📜 My History <span>▶</span></button>
    <button class="history-btn" id="lastCatchBtn">🐟 Last catch: -- <span>▶</span></button>
  </div>
</div>

<!-- RESULT POPUP -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <h2 id="resultTitle">You caught something!</h2>
    <div class="result-fish" id="resultFish">🐟</div>
    <div id="resultAmt"></div>
    <div id="resultDetail" style="font-size:13px;color:#80deea;margin-top:6px"></div>
    <button class="result-close" onclick="closeResult()">Fish Again!</button>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="histModal">
  <div class="modal-box">
    <h3>🎣 My Fishing History</h3>
    <div id="histList"></div>
    <button class="modal-close" onclick="closeHistory()">Close</button>
  </div>
</div>

<script>
// ========== FISH DATA ==========
const FISH = [
  { icon: '🦐', name: 'Shrimp',    mult: 2,   prob: 0.30, color: '#ff8a80', size: 18 },
  { icon: '🐡', name: 'Blowfish',  mult: 3,   prob: 0.22, color: '#ffd180', size: 22 },
  { icon: '🐟', name: 'Fish',      mult: 5,   prob: 0.18, color: '#80d8ff', size: 26 },
  { icon: '🐠', name: 'Clownfish', mult: 8,   prob: 0.12, color: '#ff9100', size: 28 },
  { icon: '🐬', name: 'Dolphin',   mult: 15,  prob: 0.08, color: '#64b5f6', size: 34 },
  { icon: '🦈', name: 'Shark',     mult: 25,  prob: 0.05, color: '#b0bec5', size: 38 },
  { icon: '🐙', name: 'Octopus',   mult: 40,  prob: 0.03, color: '#ce93d8', size: 32 },
  { icon: '🎏', name: 'Golden',    mult: 100, prob: 0.02, color: '#ffd700', size: 36 },
];

// ========== STATE ==========
const urlP = new URLSearchParams(window.location.search);
let state = {
  name: urlP.get('name') || 'Player',
  id:   urlP.get('id')   || 'user_' + Math.random().toString(36).substr(2,6),
  balance: parseInt(urlP.get('balance') || '5000'),
  history: JSON.parse(localStorage.getItem('fishHistory') || '[]'),
  casting: false,
  selectedFish: -1, // -1 = any
  round: parseInt(localStorage.getItem('fishRound') || '1')
};

// ========== CANVAS ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W = canvas.width, H = canvas.height;

// Swimming fish objects
let swimFish = [];
let bobber = null;
let line = null;
let particles = [];
let animId;

// Generate swimming fish
function spawnFish() {
  swimFish = [];
  for (let i = 0; i < 18; i++) {
    const f = FISH[Math.floor(Math.random() * FISH.length)];
    swimFish.push({
      x: Math.random() * W,
      y: 120 + Math.random() * (H - 160),
      vx: (Math.random() * 1.2 + 0.4) * (Math.random() > 0.5 ? 1 : -1),
      vy: (Math.random() * 0.3 - 0.15),
      icon: f.icon, size: f.size + Math.random() * 8,
      color: f.color, fishRef: f,
      flip: false, wobble: Math.random() * Math.PI * 2
    });
  }
}

// ========== DRAW ==========
function drawScene() {
  ctx.clearRect(0, 0, W, H);

  // Sky
  const skyGrad = ctx.createLinearGradient(0, 0, 0, 100);
  skyGrad.addColorStop(0, '#001122');
  skyGrad.addColorStop(1, '#002244');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, 100);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let s of stars) {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Moon
  ctx.fillStyle = '#fffde7';
  ctx.beginPath();
  ctx.arc(W - 50, 30, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#001a33';
  ctx.beginPath();
  ctx.arc(W - 42, 26, 18, 0, Math.PI * 2);
  ctx.fill();

  // Water surface wave
  ctx.fillStyle = '#003366';
  ctx.beginPath();
  ctx.moveTo(0, 95);
  for (let x = 0; x <= W; x += 8) {
    ctx.lineTo(x, 95 + Math.sin((x + Date.now() * 0.02) * 0.06) * 5);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();

  // Water body
  const waterGrad = ctx.createLinearGradient(0, 100, 0, H);
  waterGrad.addColorStop(0, 'rgba(0,60,120,0.95)');
  waterGrad.addColorStop(1, 'rgba(0,20,60,0.98)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, 108, W, H - 108);

  // Caustics (light patterns underwater)
  ctx.strokeStyle = 'rgba(0,188,212,0.08)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.ellipse(
      (i * 60 + Date.now() * 0.01) % W,
      160 + i * 30,
      20 + Math.sin(Date.now() * 0.001 + i) * 8,
      8, 0, 0, Math.PI * 2
    );
    ctx.stroke();
  }

  // Seabed
  const bedGrad = ctx.createLinearGradient(0, H - 40, 0, H);
  bedGrad.addColorStop(0, '#1a3a1a');
  bedGrad.addColorStop(1, '#0d1f0d');
  ctx.fillStyle = bedGrad;
  ctx.beginPath();
  ctx.moveTo(0, H - 30);
  for (let x = 0; x <= W; x += 20) {
    ctx.lineTo(x, H - 28 + Math.sin(x * 0.1) * 6);
  }
  ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath();
  ctx.fill();

  // Seaweed
  for (let sw of seaweed) {
    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(sw.x, H - 28);
    for (let i = 1; i <= 4; i++) {
      ctx.quadraticCurveTo(
        sw.x + Math.sin(Date.now() * 0.002 + i + sw.off) * 12,
        H - 28 - i * 16,
        sw.x, H - 28 - i * 18
      );
    }
    ctx.stroke();
  }

  // Bubbles
  for (let b of bubbles) {
    ctx.strokeStyle = `rgba(0,188,212,${b.a})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Swimming fish
  for (let f of swimFish) {
    ctx.save();
    ctx.translate(f.x, f.y + Math.sin(f.wobble) * 3);
    if (f.vx < 0) ctx.scale(-1, 1);
    ctx.font = `${f.size}px serif`;
    ctx.fillText(f.icon, -f.size/2, f.size/2);
    ctx.restore();
  }

  // Fishing line
  if (line) {
    ctx.strokeStyle = 'rgba(200,200,200,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(line.x1, line.y1);
    ctx.quadraticCurveTo(line.cx, line.cy, line.x2, line.y2);
    ctx.stroke();
  }

  // Bobber
  if (bobber) {
    const by = bobber.y + Math.sin(Date.now() * 0.005) * (bobber.sinking ? 0 : 3);
    // Float
    ctx.fillStyle = '#f44336';
    ctx.beginPath();
    ctx.ellipse(bobber.x, by, 8, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(bobber.x, by - 2, 4, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Ripple
    ctx.strokeStyle = 'rgba(0,188,212,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(bobber.x, by, 14 + Math.sin(Date.now()*0.008)*4, 4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Particles (catch effect)
  for (let p of particles) {
    ctx.fillStyle = `rgba(${p.color},${p.a})`;
    ctx.font = `${p.size}px serif`;
    ctx.fillText(p.icon, p.x, p.y);
  }

  // Fisherman silhouette on right
  drawFisherman();
}

function drawFisherman() {
  ctx.fillStyle = '#000';
  // Body
  ctx.beginPath();
  ctx.ellipse(W - 28, 72, 10, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head
  ctx.beginPath();
  ctx.arc(W - 28, 52, 9, 0, Math.PI * 2);
  ctx.fill();
  // Hat
  ctx.fillRect(W - 38, 44, 20, 4);
  ctx.fillRect(W - 34, 36, 12, 10);
  // Rod
  ctx.strokeStyle = '#5d4037';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W - 22, 58);
  ctx.lineTo(W - 60, 20);
  ctx.stroke();
  // Rod tip to bobber line handled in line draw
}

// ========== ANIMATION OBJECTS ==========
let stars = [];
let seaweed = [];
let bubbles = [];

function initScene() {
  stars = Array.from({length:40}, () => ({
    x: Math.random()*W, y: Math.random()*90, r: Math.random()*1.5+0.3
  }));
  seaweed = Array.from({length:8}, () => ({
    x: Math.random()*W, off: Math.random()*10
  }));
  bubbles = Array.from({length:15}, () => ({
    x: Math.random()*W, y: 150+Math.random()*(H-200),
    r: Math.random()*4+2, a: Math.random()*0.4+0.1,
    vy: -(Math.random()*0.4+0.2)
  }));
  spawnFish();
}

function updateScene() {
  // Move fish
  for (let f of swimFish) {
    f.x += f.vx;
    f.y += f.vy;
    f.wobble += 0.04;
    if (f.x > W + 40) f.x = -40;
    if (f.x < -40) f.x = W + 40;
    if (f.y < 115 || f.y > H - 45) f.vy *= -1;
  }
  // Bubbles float up
  for (let b of bubbles) {
    b.y += b.vy;
    if (b.y < 110) { b.y = H - 50; b.x = Math.random()*W; }
  }
  // Particles
  for (let p of particles) {
    p.x += p.vx; p.y += p.vy; p.a -= 0.025; p.vy -= 0.05;
  }
  particles = particles.filter(p => p.a > 0);
  // Bobber descend when casting
  if (bobber && bobber.descending) {
    bobber.y += 4;
    if (bobber.y >= bobber.targetY) {
      bobber.y = bobber.targetY;
      bobber.descending = false;
      bobber.waiting = true;
      // After random delay, show bite!
      setTimeout(showBite, 1200 + Math.random() * 2500);
    }
    if (line) {
      line.x2 = bobber.x; line.y2 = bobber.y;
      line.cy = (line.y1 + bobber.y) / 2 + 20;
    }
  }
}

function gameLoop() {
  updateScene();
  drawScene();
  animId = requestAnimationFrame(gameLoop);
}

// ========== FISH SELECTOR UI ==========
function buildMultTable() {
  const container = document.getElementById('multTable');
  // "Any fish" option
  container.innerHTML = `<div class="mult-item selected" id="fish-any" onclick="selectFish(-1)">
    <div class="fish-icon">🎣</div>
    <div class="fish-mult">Any</div>
    <div class="fish-name">Random</div>
  </div>` + FISH.map((f,i) => `
    <div class="mult-item" id="fish-${i}" onclick="selectFish(${i})">
      <div class="fish-icon">${f.icon}</div>
      <div class="fish-mult">x${f.mult}</div>
      <div class="fish-name">${f.name}</div>
    </div>
  `).join('');
}

function selectFish(idx) {
  state.selectedFish = idx;
  document.querySelectorAll('.mult-item').forEach(el => el.classList.remove('selected'));
  document.getElementById(idx === -1 ? 'fish-any' : `fish-${idx}`).classList.add('selected');
}

// ========== CAST LINE ==========
function castLine() {
  if (state.casting) return;
  const bet = parseInt(document.getElementById('betInput').value);
  if (!bet || bet < 10) { alert('Minimum bet is 10 💎'); return; }
  if (bet > state.balance) { alert('Insufficient diamonds! 💎'); return; }

  state.casting = true;
  state.balance -= bet;
  updateUI();
  document.getElementById('castBtn').disabled = true;
  document.getElementById('castBtn').textContent = '⏳ Waiting for bite...';

  // Place bobber
  const bx = W * 0.3 + Math.random() * W * 0.3;
  const by = 112;
  const targetY = 140 + Math.random() * (H - 220);
  bobber = { x: bx, y: by, targetY, descending: true, waiting: false };
  line = { x1: W - 60, y1: 20, x2: bx, y2: by, cx: (W-60+bx)/2 };
}

function showBite() {
  if (!state.casting) return;
  // Bobber shake effect
  if (bobber) { bobber.descending = false; bobber.sinking = true; }

  // Determine catch
  let caughtFish;
  if (state.selectedFish >= 0) {
    // 40% chance to get selected fish, else random
    if (Math.random() < 0.4) {
      caughtFish = FISH[state.selectedFish];
    } else {
      caughtFish = getRandomFish();
    }
  } else {
    caughtFish = getRandomFish();
  }

  const bet = parseInt(document.getElementById('betInput').value) || 100;
  const winAmount = bet * caughtFish.mult;
  const net = winAmount - bet;
  state.balance += winAmount;

  // Save history
  const rec = {
    round: state.round++,
    fish: caughtFish.icon,
    name: caughtFish.name,
    mult: caughtFish.mult,
    bet, win: winAmount, net,
    time: new Date().toLocaleTimeString()
  };
  state.history.unshift(rec);
  if (state.history.length > 50) state.history.pop();
  localStorage.setItem('fishHistory', JSON.stringify(state.history));
  localStorage.setItem('fishRound', state.round);

  // Particles burst
  spawnParticles(bobber ? bobber.x : W/2, bobber ? bobber.y : H/2, caughtFish.icon);

  // Show result
  setTimeout(() => showResult(caughtFish, bet, winAmount, net), 400);
}

function getRandomFish() {
  const r = Math.random();
  let cum = 0;
  for (let f of FISH) {
    cum += f.prob;
    if (r <= cum) return f;
  }
  return FISH[0];
}

function spawnParticles(x, y, icon) {
  const colors = ['255,215,0', '0,188,212', '255,255,255'];
  for (let i = 0; i < 10; i++) {
    particles.push({
      x, y, icon,
      vx: (Math.random()-0.5)*4,
      vy: -(Math.random()*3+1),
      a: 1, size: 16+Math.random()*12,
      color: colors[Math.floor(Math.random()*colors.length)]
    });
  }
}

function showResult(fish, bet, win, net) {
  document.getElementById('resultFish').textContent = fish.icon;
  document.getElementById('resultTitle').textContent = `You caught a ${fish.name}!`;
  document.getElementById('resultDetail').textContent = `Bet: 💎${bet}  |  Multiplier: x${fish.mult}`;
  if (net >= 0) {
    document.getElementById('resultAmt').innerHTML = `<div class="win-amount">+💎${formatNum(net)}</div>`;
  } else {
    document.getElementById('resultAmt').innerHTML = `<div class="lose-amount">-💎${formatNum(Math.abs(net))}</div>`;
  }
  document.getElementById('resultOverlay').classList.add('show');
  document.getElementById('lastCatchBtn').textContent = `${fish.icon} Last: x${fish.mult} ▶`;
  updateUI();
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('show');
  bobber = null; line = null;
  state.casting = false;
  document.getElementById('castBtn').disabled = false;
  document.getElementById('castBtn').textContent = '🎣 Cast Line!';
  spawnFish();
}

// ========== HISTORY ==========
function showHistory() {
  const list = document.getElementById('histList');
  if (state.history.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#aaa;padding:20px">No catches yet!</div>';
  } else {
    list.innerHTML = state.history.map(h => `
      <div class="h-item">
        <span style="color:#80deea">Round ${h.round}</span>
        <span>${h.fish} ${h.name}</span>
        <span style="color:#80deea">x${h.mult}</span>
        <span style="color:${h.net>=0?'#00e676':'#ff5252'};font-weight:bold">
          ${h.net>=0?'+':''}💎${formatNum(h.net)}
        </span>
      </div>
    `).join('');
  }
  document.getElementById('histModal').classList.add('show');
}

function closeHistory() {
  document.getElementById('histModal').classList.remove('show');
}

// ========== UI ==========
function addBet(n) {
  const inp = document.getElementById('betInput');
  inp.value = (parseInt(inp.value)||0) + n;
}

function updateUI() {
  document.getElementById('balEl').textContent = formatNum(state.balance);
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

// ========== INIT ==========
document.getElementById('nameEl').textContent = state.name;
document.getElementById('idEl').textContent = 'ID: ' + state.id;
document.getElementById('avatarEl').textContent = state.name.charAt(0).toUpperCase();
updateUI();
buildMultTable();
initScene();
gameLoop();
</script>
